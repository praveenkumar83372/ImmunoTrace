<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login - ImmunoTrace</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <style>
        /* Reusing Signup Styles for Consistency */
        .auth-container{ display:flex; height:100vh; }
        .auth-left{ width:50%; background: #1e1b4b; }
        .auth-left img{ width:100%; height:100%; object-fit:cover; }
        .auth-right{ width:50%; display:flex; justify-content:center; align-items:center; background:#f5f5f5; }
        .auth-box{ width:360px; background:white; padding:30px; border-radius:16px; box-shadow:0 10px 30px rgba(0,0,0,0.08); }
        .brand{ font-size:22px; font-weight:700; color:#3b2f7f; margin-bottom:10px; }
        .input-group{ margin-bottom:15px; }
        .input-group label{ font-size:14px; font-weight: 600; }
        .input-group input{ width:100%; padding:12px; margin-top:6px; border-radius:8px; border:1px solid #ccc; }
        .auth-btn{ width:100%; padding:12px; background:#1e1b4b; color:white; border:none; border-radius:8px; cursor:pointer; font-size:16px; }
        .auth-footer{ text-align:center; margin-top:15px; font-size:13px; }
        .dark .auth-right { background: #0f172a; }
        .dark .auth-box { background: #1e293b; color: white; }
        .dark input { background: #0f172a; border: 1px solid #334155; color: white; }
    </style>
</head>
<body>

<div class="auth-container">
    <div class="auth-left"><img src="image2.png" alt="Welcome Back"></div>
    <div class="auth-right">
        <div class="auth-box">
            <div class="brand">ImmunoTrace</div>
            <h2>Welcome Back</h2>
            <p>Enter your credentials to access your dashboard</p>

            <div class="input-group">
                <label>Email Address</label>
                <input id="loginEmail" type="email" placeholder="you@email.com">
            </div>
            <div class="input-group">
                <label>Password</label>
                <input id="loginPass" type="password" placeholder="********">
            </div>

            <button onclick="handleLogin()" class="auth-btn">Sign In</button>
            <div class="auth-footer">
                Don't have an account? <a href="signup.html"><b>Register</b></a>
            </div>
        </div>
    </div>
</div>

<script>
    function handleLogin() {
        let email = document.getElementById("loginEmail").value.trim();
        let pass = document.getElementById("loginPass").value.trim();

        if(!email || !pass) {
            alert("Please enter both email and password");
            return;
        }

        // Call the login function in script.js
        if(typeof login === "function") {
            login(email, pass);
        } else {
            alert("Error: script.js core logic not found.");
        }
    }

    document.addEventListener("keypress", (e) => { if(e.key === "Enter") handleLogin(); });
    window.onload = () => { if(typeof initTheme === "function") initTheme(); };
</script>
</body>
</html>
