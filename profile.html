<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile - ImmunoTrace</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>

<div class="app">
    <div class="sidebar">
        <div>
            <div class="logo">ImmunoTrace</div>
            <p class="active">Profile</p>
            <p onclick="location.href='index.html'" style="cursor:pointer;">Dashboard</p>
            <p onclick="location.href='aboutus.html'" style="cursor:pointer;">About Us</p>
        </div>
        <div>
            <div id="deviceStatus" class="status-box">● Checking...</div>
            <button onclick="logout()" class="logout">Logout</button>
        </div>
    </div>

    <div class="main">
        <div class="topbar">
            <h2 id="pageTitle">Welcome back 👋</h2>
            <div class="top-right">
                <div id="deviceStatusTop">● Checking...</div>
                <button onclick="toggleTheme()" class="theme-toggle">🌙</button>
            </div>
        </div>

        <div class="content">
            <div class="grid">
                <div class="left">
                    <div class="card">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                            <h3>User Information</h3>
                            <button onclick="toggleEdit()" id="editBtn" class="btn">Edit</button>
                        </div>
                        <div class="profile-grid">
                            <div class="input-group">
                                <label><small>Full Name</small></label>
                                <input id="name" placeholder="Name" disabled>
                            </div>
                            <div class="input-group">
                                <label><small>Age</small></label>
                                <input id="age" placeholder="Age" disabled>
                            </div>
                            <div class="input-group">
                                <label><small>Email</small></label>
                                <input id="email" placeholder="Email" disabled>
                            </div>
                            <div class="input-group">
                                <label><small>Phone</small></label>
                                <input id="phone" placeholder="Phone" disabled>
                            </div>
                            <div class="input-group">
                                <label><small>Joined Date</small></label>
                                <input id="joined" placeholder="Joined Date" disabled>
                            </div>
                            <div class="input-group">
                                <label><small>Occupation</small></label>
                                <input id="occupation" placeholder="Occupation" disabled>
                            </div>
                        </div>
                    </div>

                    <div class="card">
                        <h3>Recent Health Reports</h3>
                        <div id="reportList" style="max-height: 400px; overflow-y: auto; margin-top: 10px;">
                        </div>
                    </div>
                </div>

                <div class="right">
                    <div class="card">
                        <h4>AI Health Insights</h4>
                        <div id="profileInsights" class="muted">No insights yet</div>
                    </div>

                    <div class="card">
                        <h4>Recent Heart Rate Trends</h4>
                        <canvas id="trendGraph" height="180" style="width: 100%;"></canvas>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
/* ===============================
   STORAGE & THEME
   =============================== */
const getCurrentUser = () => JSON.parse(localStorage.getItem("currentUser"));
const setCurrentUser = (u) => localStorage.setItem("currentUser", JSON.stringify(u));
const getUsers = () => JSON.parse(localStorage.getItem("users")) || [];
const saveUsers = (u) => localStorage.setItem("users", JSON.stringify(u));

function applyStoredTheme() {
    if (localStorage.getItem("theme") === "dark") {
        document.documentElement.classList.add("dark");
        document.body.classList.add("dark");
    }
}

function syncDevice() {
    let main = document.getElementById("deviceStatus");
    let top = document.getElementById("deviceStatusTop");
    if (main && top) {
        top.innerText = main.innerText;
        top.style.color = main.style.color;
    }
}
setInterval(syncDevice, 1000);

/* ===============================
   PROFILE LOGIC
   =============================== */
let editing = false;

function loadProfile() {
    let user = getCurrentUser();
    if (!user) return;
    ["name", "age", "email", "phone", "joined", "occupation"].forEach(id => {
        let el = document.getElementById(id);
        if (el) el.value = user[id] || "-";
    });
}

function toggleEdit() {
    editing = !editing;
    let inputs = document.querySelectorAll(".profile-grid input");
    let btn = document.getElementById("editBtn");

    inputs.forEach(i => {
        i.disabled = !editing;
        if (editing) i.style.borderBottom = "2px solid #6366f1";
        else i.style.borderBottom = "none";
    });

    btn.innerText = editing ? "Save Changes" : "Edit";
    btn.style.background = editing ? "#22c55e" : "#6366f1";

    if (!editing) saveProfile();
}

function saveProfile() {
    let users = getUsers();
    let current = getCurrentUser();
    if (!current) return;

    ["name", "age", "email", "phone", "joined", "occupation"].forEach(id => {
        current[id] = document.getElementById(id).value;
    });

    let updatedUsers = users.map(u => u.email === current.email ? current : u);
    saveUsers(updatedUsers);
    setCurrentUser(current);
    alert("Profile Updated ✅");
}

/* ===============================
   FINAL CLINICAL PDF GENERATOR 🔥
   =============================== */
function generateMedicalReport(index) {
    let user = getCurrentUser();
    let r = user.reports[index];
    const { jsPDF } = window.jspdf;
    let doc = new jsPDF();

    // Header
    doc.setFillColor(30, 27, 75); 
    doc.rect(0, 0, 210, 40, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(24); doc.setFont("helvetica", "bold");
    doc.text("ImmunoTrace", 20, 22);
    doc.setFontSize(10); doc.setFont("helvetica", "normal");
    doc.text("AI-Powered Health Diagnostic Report", 20, 31);

    // Patient Info
    doc.setTextColor(0, 0, 0);
    doc.setFontSize(11); doc.setFont("helvetica", "bold");
    doc.text("PATIENT INFORMATION", 20, 55);
    doc.setFont("helvetica", "normal"); doc.setFontSize(10);
    doc.text(`Full Name: ${user.name}`, 20, 65);
    doc.text(`Email ID: ${user.email}`, 20, 72);
    doc.text(`Age: ${user.age || "N/A"}`, 20, 79);
    doc.text(`Date: ${r.date}`, 130, 65);
    doc.text(`Report ID: IT-${Math.floor(100000 + Math.random() * 900000)}`, 130, 72);
    doc.line(20, 85, 190, 85);

    // Vitals
    doc.setFont("helvetica", "bold"); doc.text("VITAL SIGNS ANALYSIS", 20, 95);
    doc.setFillColor(245, 245, 250); doc.rect(20, 100, 170, 8, 'F');
    doc.setFontSize(9); doc.text("Parameter", 25, 106); doc.text("Reading", 90, 106); doc.text("Status", 150, 106);
    
    doc.setFont("helvetica", "normal");
    doc.text("Heart Rate", 25, 115); doc.text(`${r.heart} BPM`, 90, 115); doc.text("Stable", 150, 115);
    doc.text("SpO2", 25, 125); doc.text(`${r.spo2}%`, 90, 125); doc.text("Optimal", 150, 125);
    doc.text("Body Temp", 25, 135); doc.text(`${r.temp}°C`, 90, 135); doc.text("Normal", 150, 135);

    // Nutritional Markers
    if (r.vitamins) {
        doc.setFont("helvetica", "bold"); doc.text("NUTRITIONAL MARKERS", 20, 155);
        let vList = [
            ["Vitamin A", r.vitamins.vitA], ["Vitamin B", r.vitamins.vitB],
            ["Vitamin C", r.vitamins.vitC], ["Vitamin D", r.vitamins.vitD],
            ["Calcium", r.vitamins.calcium], ["Zinc", r.vitamins.zinc]
        ];
        vList.forEach((v, i) => {
            let col = i % 2; let row = Math.floor(i / 2);
            let x = 20 + (col * 85); let y = 165 + (row * 12);
            doc.setFillColor(248, 248, 255); doc.roundedRect(x, y-5, 80, 10, 2, 2, 'F');
            doc.text(`${v[0]}: ${v[1]}`, x + 5, y + 2);
        });
    }

    // Footer
    doc.line(20, 250, 190, 250);
    doc.setFontSize(9); doc.text("Software: ImmunoTrace Suite v2.0", 20, 260);
    doc.text("Email: team404.mgr@gmail.com | Helpline: +91 98765 43210", 20, 268);

    doc.save(`ImmunoTrace_Report_${user.name}.pdf`);
}

function loadReports() {
    let user = getCurrentUser();
    let box = document.getElementById("reportList");
    if (!box || !user?.reports) return;
    box.innerHTML = "";
    [...user.reports].reverse().forEach((r, i) => {
        let idx = user.reports.length - 1 - i;
        box.innerHTML += `
            <div style="display:flex; justify-content:space-between; align-items:center; padding:15px; border-bottom:1px solid rgba(0,0,0,0.05); background: rgba(0,0,0,0.02); margin-bottom:8px; border-radius:12px;">
                <div>
                    <strong>${r.date}</strong><br>
                    <small>${r.heart} BPM | ${r.spo2}% SpO2</small>
                </div>
                <button onclick="generateMedicalReport(${idx})" class="pdf-btn">Download PDF</button>
            </div>`;
    });
}

function drawTrend() {
    let canvas = document.getElementById("trendGraph");
    if (!canvas) return;
    let ctx = canvas.getContext("2d");
    let user = getCurrentUser();
    if (!user?.reports || user.reports.length < 2) return;

    let data = user.reports.slice(-10).map(r => parseInt(r.heart) || 0);
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    ctx.beginPath();
    ctx.lineWidth = 4; ctx.strokeStyle = "#6366f1";
    let spacing = canvas.width / (data.length - 1);
    data.forEach((v, i) => {
        let x = i * spacing;
        let y = canvas.height - (v - 50) * (canvas.height / 100); 
        if (i === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    });
    ctx.stroke();
}

window.onload = () => {
    applyStoredTheme();
    loadProfile();
    loadReports();
    drawTrend();
};
</script>

<style>
    .profile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
    .input-group { display: flex; flex-direction: column; }
    .profile-grid input { padding: 10px; border: none; background: transparent; border-radius: 8px; color: inherit; transition: 0.3s; }
    .btn { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; background: #6366f1; color: white; font-weight: bold; }
    .pdf-btn { padding: 8px 16px; background: #6366f1; color: white; border-radius: 8px; border: none; cursor: pointer; font-size: 0.9em; }
    .muted { color: #888; font-size: 0.95em; line-height: 1.6; }
</style>

</body>
</html>
